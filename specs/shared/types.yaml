version: "2.0"

shared_types:

  Stance:
    type: enum
    values: [bullish, bearish, neutral]
    description: 캐릭터의 코인 전망 입장

  Team:
    type: enum
    values: [bull, bear]
    description: 현재 구현에서 사용하는 팀 식별자

  Sentiment:
    type: enum
    values: [positive, negative, neutral]
    description: 지표의 긍정/부정 방향

  CharacterState:
    type: enum
    values: [idle, speaking, done]
    description: 토론 진행 중 캐릭터 상태

  StreamEventType:
    type: enum
    values:
      - battle_start
      - character_start
      - message
      - character_done
      - battle_complete
